{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h1 class="font-pacifico text-brand-brown">Mon Panier</h1>
    <hr>

    {% if panier %}
        <div class="list-group">
            {% for item in panier %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">{{ item.nom }}</h5>
                        <small>Quantité : {{ item.quantite }} convives</small>
                    </div>
                    <span class="badge bg-primary rounded-pill">{{ item.prix_total }}€</span>
                </div>
            {% endfor %}
        </div>
        <div class="mt-4 text-end">
            <a href="{{ url_for('menus_page') }}" class="btn btn-outline-secondary">Continuer mes achats</a>
            <button class="btn btn-success">Valider la commande</button>
        </div>
    {% else %}
        <p>Votre panier est vide.</p>
        <a href="{{ url_for('menus_page') }}" class="btn btn-custom-brown">Voir les menus</a>
    {% endif %}
</div>
{% endblock %}
