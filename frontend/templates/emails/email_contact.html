<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background-color: #FFEDC5; padding: 20px; color: #885420;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #FFDE96; border-radius: 16px; padding: 30px; box-shadow: 0 4px 15px rgba(136, 84, 32, 0.1);">

        <h2 style="color: #885420; margin-top: 0; border-bottom: 2px solid #FFEDC5; padding-bottom: 10px;">
            📥 Nouveau message de contact
        </h2>

        <p style="font-size: 15px;"><strong>Motif :</strong> {{ motif }}</p>
        <p style="font-size: 15px;"><strong>Client :</strong> {{ prenom }} {{ nom }} ({{ email }})</p>

        <div style="background-color: #FFEDC5; padding: 15px; border-radius: 8px; color: #885420; font-size: 15px; line-height: 1.6; margin-top: 20px;">
            <strong>Message :</strong><br>
            {{ description | replace('\n', '<br>') | safe }}
        </div>

    </div>
</body>
</html>
