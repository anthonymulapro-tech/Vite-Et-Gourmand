{% extends 'base.html' %} {% block content %}
<div class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4 p-5">
                <div class="mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#198754" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                      <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                    </svg>
                </div>
                
                <h1 class="h3 mb-3 font-weight-bold text-dark">Merci pour votre commande !</h1>
                <p class="text-muted mb-4">Votre paiement a été accepté et votre commande est en cours de préparation par notre équipe.</p>
                
                <div class="bg-light p-3 rounded-3 mb-4">
                    <span class="d-block text-secondary small text-uppercase fw-bold mb-1">Référence de votre commande</span>
                    <span class="fs-5 fw-bold text-dark">{{ reference }}</span>
                </div>
                
                <a href="{{ url_for('home') }}" class="btn btn-outline-dark rounded-pill px-4 py-2">
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
